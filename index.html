<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5"
    />
    <meta name="robots" content="index, follow" />
    <meta
      name="googlebot"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Discover handcrafted luxury travel experiences and curated adventures with Valitsa Travel. Premium packages, private estates, and unforgettable journeys worldwide."
    />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://valitsatravel.gr/" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/branding/favicon/favicon-light.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/branding/favicon/favicon-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/branding/favicon/favicon-light.svg"
    />
    <link rel="apple-touch-icon" href="/branding/favicon/favicon-light.svg" />
    <link rel="alternate" hreflang="el" href="https://valitsatravel.gr/" />
    <link rel="alternate" hreflang="en" href="https://valitsatravel.gr/" />
    <script>
      try {
        var s = localStorage.getItem("darkMode");
        var dark = s === null ? true : s === "true";
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
    <title>
      Valitsa Travel - Premium Luxury Travel Experiences & Curated Journeys
    </title>
    <meta name="author" content="Valitsa Travel" />
    <meta name="copyright" content="© 2026 Valitsa Travel" />
    <meta name="language" content="English, Greek" />

    <!-- Open Graph for Social Media -->
    <meta
      property="og:title"
      content="Valitsa Travel - Premium Luxury Travel Experiences"
    />
    <meta
      property="og:description"
      content="Discover handcrafted luxury travel experiences and curated adventures. Private estates, yacht charters, cultural immersion worldwide."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://valitsatravel.gr/" />
    <meta
      property="og:image"
      content="https://valitsatravel.gr/branding/navbar/logo-light.svg"
    />
    <meta property="og:image:alt" content="Valitsa Travel Logo" />
    <meta property="og:image:width" content="200" />
    <meta property="og:image:height" content="60" />
    <meta property="og:site_name" content="Valitsa Travel" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="el_GR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@valitsatravel" />
    <meta
      name="twitter:title"
      content="Valitsa Travel - Premium Luxury Travel Experiences"
    />
    <meta
      name="twitter:description"
      content="Discover handcrafted luxury travel experiences and curated adventures with Valitsa Travel."
    />
    <meta
      name="twitter:image"
      content="https://valitsatravel.gr/branding/navbar/logo-light.svg"
    />
    <meta name="twitter:image:alt" content="Valitsa Travel Logo" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
